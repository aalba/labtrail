<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LAB TRAIL: 2027</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#0f1730;
      --muted:#95a0ba;
      --text:#e9eefc;
      --line:#223056;
      --good:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --btn:#2563eb;
      --btn2:#111827;
      --shadow:0 18px 45px rgba(0,0,0,.35);
      --radius:18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1200px 800px at 10% 10%, #18224a 0%, rgba(24,34,74,0) 55%),
                  radial-gradient(900px 700px at 85% 20%, #1a2b5a 0%, rgba(26,43,90,0) 55%),
                  radial-gradient(1000px 800px at 45% 90%, #141a33 0%, rgba(20,26,51,0) 60%),
                  var(--bg);
      color:var(--text);
      padding:18px;
    }
    a{color:inherit}
    .app{max-width:1100px;margin:0 auto}
    .topbar{
      display:flex;align-items:flex-end;justify-content:space-between;
      gap:14px;flex-wrap:wrap;
      padding:16px 16px 8px 16px;
    }
    .brand .t{font-weight:800;letter-spacing:.4px;font-size:20px}
    .brand .s{color:var(--muted);font-size:12px;margin-top:4px}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
    @media (max-width: 920px){.grid{grid-template-columns:1fr}}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.07);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    h2{margin:0 0 10px 0;font-size:18px}
    h3{margin:12px 0 8px 0;font-size:14px;color:#cfd7f2}
    p{margin:8px 0;color:var(--muted);line-height:1.4}
    .notice{
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:12px;
      margin:10px 0;
    }
    .notice.good{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08)}
    .notice.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.08)}
    .notice.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .pill{
      display:inline-flex;gap:6px;align-items:center;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:#d6def9;
    }
    .mono{font-family:var(--mono)}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .sep{height:1px;background:rgba(255,255,255,.08);margin:12px 0}
    .btns{display:flex;gap:8px;flex-wrap:wrap}
    button{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:650;
      letter-spacing:.2px;
    }
    button.primary{background:rgba(37,99,235,.22);border-color:rgba(37,99,235,.45)}
    button.ghost{background:transparent}
    button.danger{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.38)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .kbd{
      font-family:var(--mono);
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.04);
      padding:2px 6px;border-radius:8px;
    }
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width: 700px){.two-col{grid-template-columns:1fr}}
    table.table{width:100%;border-collapse:collapse;font-size:13px}
    .table th,.table td{
      border-bottom:1px solid rgba(255,255,255,.07);
      padding:8px 6px;
      vertical-align:top;
    }
    .table th{color:#cfd7f2;text-align:left;font-weight:750}
    ul.list{margin:8px 0 0 18px;color:var(--muted);line-height:1.35}
    .counter{
      display:flex;align-items:center;justify-content:space-between;
      gap:10px;padding:10px;border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.02);
      margin:8px 0;
    }
    .counter .name{font-weight:750}
    .counter .meta{color:var(--muted);font-size:12px;margin-top:2px}
    .counter .actions{display:flex;align-items:center;gap:8px}
    .counter button{padding:8px 10px;border-radius:12px}
    .counter button.danger{background:rgba(239,68,68,.16)}
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
(() => {
  const ROOT = document.getElementById("app");
  const STORAGE_KEY = "labtrail_v1";

  const COSTS = {
    staff: { IP:80000, S:35000, T:50000, R:50000, AM:30000, BM:60000 },
    ai:    { GPT:1000,  AGI:1000,  PI:10000 },
    equipment: { MED:150000, HIGH:450000 },
    opsRate: 0.20,
    overheadRate: 0.20
  };

  const AI_AVAILABLE = {
    GPT: (p) => true,
    AGI: (p) => p >= 5,
    PI:  (p) => p >= 10
  };

  const WORLDS = {
    predictable: { id:"predictable", label:"Predecible", eventScale:0.9, flagCap:2 },
    chaotic:     { id:"chaotic",     label:"Caótico",    eventScale:1.2, flagCap:2 }
  };

  function getWorldConfig(){
    const w = (STATE.world || "predictable");
    return WORLDS[w] || WORLDS.predictable;
  }

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function floor(v){ return Math.floor(v); }
  function eur(n){ return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n||0); }
  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

  function yearFromPeriod(p){ return 2027 + (p||0); }

  function wipeSave(){
    localStorage.removeItem(STORAGE_KEY);
  }
  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    }catch(e){ return null; }
  }
  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
  }

  function newGame(){
    return {
      screen: "title",
      world: "predictable",

      period: 0,

      budgetGross: 200000,            // presupuesto bruto del periodo (ingreso)
      budget: 0,                       // presupuesto disponible (calculado)

      staff: { IP:1, S:0, T:0, R:0, AM:0, BM:0 },
      ai:    { GPT:0, AGI:0, PI:0 },
      equip: { MED:0, HIGH:0 },
      equipHistory: [],

      piTime: "read",
      overheadChoice: null,
      overheadTemp: {
        staffVirtual: { AM:0, T:0 },
        aiVirtual:    { GPT:0, AGI:0, PI:0 },
        equipVirtual: { MED:0, HIGH:0 },
        instBonus:    { effOp:0, reput:0 }
      },

      nextBudgetMultiplier: 1.0,

      articlesTotal: 0,
      projectsTotal: 0,
      impactIndex: 1,

      last: {
        layoffs:false,
        layoffsNote:"",
        reput:1,
        nextBudget:0,
        ideas:0,
        capExp:1,
        prodSci:1,
        effOp:1,
        innovLevel:0,
        projectsWritten:0,
        ratio:10,
        projectsGranted:0,
        articles:0,
        impactMean:0,
        budgetMean:100000,
        events:[]
      },

      activeEvents: [],
      activeFlags: [],
      toast: ""
    };
  }

  let STATE = load() || newGame();

  function toast(msg){
    STATE.toast = msg;
    setTimeout(()=>{ STATE.toast=""; render(); }, 1800);
  }

  function setScreen(s){
    STATE.screen = s;
    render();
    save();
  }

  function resetOverheadTemp(){
    STATE.overheadChoice = null;
    STATE.overheadTemp = {
      staffVirtual: { AM:0, T:0 },
      aiVirtual:    { GPT:0, AGI:0, PI:0 },
      equipVirtual: { MED:0, HIGH:0 },
      instBonus:    { effOp:0, reput:0 }
    };
  }

  function staffCost(staff){
    let c = 0;
    for (const k of Object.keys(COSTS.staff)){
      c += (staff[k]||0) * COSTS.staff[k];
    }
    return c;
  }
  function aiCost(ai, period){
    let c = 0;
    c += (ai.GPT||0) * COSTS.ai.GPT;
    c += (AI_AVAILABLE.AGI(period) ? (ai.AGI||0) : 0) * COSTS.ai.AGI;
    c += (AI_AVAILABLE.PI(period)  ? (ai.PI||0)  : 0) * COSTS.ai.PI;
    return c;
  }
  function opsCost(costPersonal){
    return COSTS.opsRate * costPersonal;
  }
  function overheadsEuro(costPersonal, costAI){
    const ops = opsCost(costPersonal);
    const subtotal = costPersonal + ops + costAI;
    return COSTS.overheadRate * subtotal;
  }
  function totalAnnualCost(staff, ai, period){
    const cP = staffCost(staff);
    const cAI = aiCost(ai, period);
    const ops = opsCost(cP);
    const oh = overheadsEuro(cP, cAI);
    return { cP, cAI, ops, oh, total: cP + cAI + ops + oh };
  }

  /* =========================================================
     Presupuesto: bruto vs disponible
     - budgetGross: ingreso del periodo (proyectos concedidos)
     - budget: disponible para compras (NO puede ser < 0)
     - El disponible se recalcula siempre como:
         max(0, budgetGross - (costes personal + costes IA + operativos + overheads))
     - Equipamiento SÍ resta directamente del budgetGross (pago único).
     ========================================================= */
  function getBudgetGross(){
    // compatibilidad con partidas antiguas
    if (typeof STATE.budgetGross !== "number") STATE.budgetGross = (typeof STATE.budget === "number" ? STATE.budget : 0);
    return STATE.budgetGross;
  }
  function getBudgetAvailable(){
    const gross = getBudgetGross();
    const t = totalAnnualCost(STATE.staff, STATE.ai, STATE.period);
    return Math.max(0, Math.round(gross - t.total));
  }
  function recalcBudget(){
    STATE.budget = getBudgetAvailable();
  }
  function canAffordCurrentSetup(){
    // Si no alcanza, el disponible será 0, pero esta función indica si “cabe” sin ir a negativo.
    const gross = getBudgetGross();
    const t = totalAnnualCost(STATE.staff, STATE.ai, STATE.period);
    return gross >= t.total;
  }
  function canAffordWith(staff, ai, gross, period){
    const t = totalAnnualCost(staff, ai, period);
    return gross >= t.total;
  }

  /* =========================================================
     Flags (máximo 2 activas)
     ========================================================= */
  function addFlag(state, id, dur){
    const cap = getWorldConfig().flagCap || 2;
    const existing = state.activeFlags.find(f => f.id === id);
    if (existing){
      existing.expiresAt = Math.max(existing.expiresAt, state.period + dur + 1);
      return;
    }
    if (state.activeFlags.length >= cap){
      state.activeFlags.sort((a,b)=>a.expiresAt-b.expiresAt);
      state.activeFlags.shift();
    }
    state.activeFlags.push({ id, expiresAt: state.period + dur + 1 });
  }
  function hasFlag(state, id){
    return state.activeFlags.some(f => f.id === id && f.expiresAt > state.period);
  }
  function pruneExpiredFlags(state){
    state.activeFlags = state.activeFlags.filter(f => f.expiresAt > state.period);
  }

  /* =========================================================
     Eventos
     ========================================================= */
  const EVENTS = [
    {
      id:"equip_broken",
      name:"Equipo averiado",
      text:"Un equipo clave falla. Pierdes capacidad y eficiencia temporalmente.",
      baseProb: 0.18,
      duration: 1,
      mods: [
        { kind:"delta", var:"capExp", value:-2 },
        { kind:"delta", var:"effOp", value:-1 }
      ]
    },
    {
      id:"admin_issue",
      name:"Problema administrativo",
      text:"Un retraso burocrático te roba tiempo operativo y reduce proyectos.",
      baseProb: 0.16,
      duration: 0,
      mods: [
        { kind:"delta", var:"effOp", value:-2 },
        { kind:"delta", var:"ratio", value:-3 }
      ]
    },
    {
      id:"funding_delay",
      name:"Retraso en financiación",
      text:"La institución retrasa pagos, lo que complica el año siguiente.",
      baseProb: 0.12,
      duration: 1,
      mods: [
        { kind:"mul_next_budget", value:0.85 }
      ]
    },
    {
      id:"paper_top",
      name:"Paper en revista top",
      text:"Publicas un paper excepcional. Aumenta reputación e impacto.",
      baseProb: 0.10,
      duration: 1,
      mods: [
        { kind:"delta", var:"reput", value:2 },
        { kind:"delta", var:"impactIndex", value:2 },
        { kind:"delta", var:"ratio", value:4 }
      ]
    },
    {
      id:"intl_collab",
      name:"Colaboración internacional",
      text:"Una colaboración abre nuevas ideas y mejora el éxito futuro.",
      baseProb: 0.12,
      duration: 2,
      flags: [{ id:"flag_collab", dur:2 }],
      mods: [
        { kind:"delta", var:"ideas", value:2 },
        { kind:"delta", var:"ratio", value:3 }
      ]
    },
    {
      id:"research_award",
      name:"Premio investigador",
      text:"Recibes un reconocimiento que impulsa reputación y resultados.",
      baseProb: 0.08,
      duration: 2,
      mods: [
        { kind:"delta", var:"reput", value:3 },
        { kind:"delta", var:"ratio", value:3 }
      ]
    },
    {
      id:"student_sick",
      name:"Baja en el equipo",
      text:"Un miembro del equipo está de baja. Baja productividad temporal.",
      baseProb: 0.12,
      duration: 0,
      mods: [
        { kind:"delta", var:"prodSci", value:-2 }
      ]
    },
    {
      id:"ai_breakthrough",
      name:"Mejora de AI",
      text:"Los módulos de AI se integran mejor: eficiencia y productividad suben.",
      baseProb: 0.09,
      duration: 1,
      mods: [
        { kind:"delta", var:"effOp", value:2 },
        { kind:"delta", var:"prodSci", value:1 }
      ]
    }
  ];

  function rand(){
    return Math.random();
  }

  function maybeAddEventsThisPeriod(){
    const world = getWorldConfig();
    const scale = world.eventScale || 1.0;

    const probPaperTop = hasFlag(STATE, "flag_collab") ? 0.18 : null;

    for (const ev of EVENTS){
      let p = ev.baseProb * scale;

      if (ev.id === "paper_top" && probPaperTop !== null){
        p = probPaperTop * scale;
      }

      if (rand() < p){
        attachEvent(ev);
      }
    }
  }

  function attachEvent(evDef){
    const p = STATE.period;
    const endsAt = p + (evDef.duration || 0);
    STATE.activeEvents.push({
      id: evDef.id,
      name: evDef.name,
      text: evDef.text,
      endsAt,
      mods: deepClone(evDef.mods || [])
    });

    for (const f of (evDef.flags || [])){
      addFlag(STATE, f.id, f.dur);
    }
  }

  /* =========================================================
     Despidos automáticos / recortes IA (inicio de año)
     ========================================================= */
  function enforceAffordability(){
    const p = STATE.period;
    let note = [];
    let layoffs = false;

    const canAfford = () => {
      const t = totalAnnualCost(STATE.staff, STATE.ai, p);
      return getBudgetGross() >= t.total;
    };

    if (canAfford()) return { layoffs:false, note:"" };

    const aiOrder = ["GPT","AGI","PI"];
    for (const k of aiOrder){
      while (STATE.ai[k] > 0 && !canAfford()){
        STATE.ai[k] -= 1;
        layoffs = true;
        note.push(`-1 módulo ${k}`);
      }
    }

    const staffOrder = ["AM","BM","S","T","R"];
    for (const k of staffOrder){
      while (STATE.staff[k] > 0 && !canAfford()){
        STATE.staff[k] -= 1;
        layoffs = true;
        note.push(`-1 ${k}`);
      }
    }

    if (!canAfford()){
      layoffs = true;
      note.push("Presupuesto insuficiente incluso tras recortes (IP fijo). Disponible = 0.");
    }

    return { layoffs, note: note.join(" · ") };
  }

  /* =========================================================
     Variables derivadas
     ========================================================= */
  function innovationLevel(){
    const p = STATE.period;
    if (STATE.equipHistory.length === 0) return 0;
    const last = Math.max(...STATE.equipHistory.map(e => e.period));
    const diff = p - last;
    if (diff <= 4) return 2;
    if (diff <= 10) return 1;
    return 0;
  }

  function activeEventMods(){
    const p = STATE.period;
    return STATE.activeEvents
      .filter(ev => ev.endsAt >= p)
      .flatMap(ev => ev.mods.map(m => ({...m, _src: ev.name})));
  }

  function computeDerived(){
    const p = STATE.period;

    const staff = STATE.staff;
    const ai = STATE.ai;
    const equip = STATE.equip;

    const vStaffAM = STATE.overheadTemp.staffVirtual.AM || 0;
    const vStaffT  = STATE.overheadTemp.staffVirtual.T  || 0;

    const vAI = STATE.overheadTemp.aiVirtual;
    const vEquip = STATE.overheadTemp.equipVirtual;

    const totalPI = 1 + (ai.PI || 0);

    const eqMed = equip.MED + (vEquip.MED||0);
    const eqHigh = equip.HIGH + (vEquip.HIGH||0);

    const modGPT = (ai.GPT||0) + (vAI.GPT||0);
    const modAGI = (AI_AVAILABLE.AGI(p) ? (ai.AGI||0) : 0) + (AI_AVAILABLE.AGI(p) ? (vAI.AGI||0) : 0);
    const modPI  = (AI_AVAILABLE.PI(p)  ? (ai.PI||0)  : 0) + (AI_AVAILABLE.PI(p)  ? (vAI.PI||0)  : 0);

    const S = staff.S;
    const T = staff.T + vStaffT;
    const R = staff.R;
    const AM = staff.AM + vStaffAM;
    const BM = staff.BM;

    const innov = innovationLevel();

    let capExp = Math.max(1, 1 + 2*eqMed + 7*eqHigh + 5*modPI + 1*T + 0.5*S + 0.5*R);
    let prodSci = Math.max(1, 1 + 2*R + 1*(modGPT+modAGI) + 0.5*eqMed + 1*eqHigh + 0.5*S);
    let effOp = Math.max(1, 1 + 2*AM + 1*(modGPT+modAGI));

    let reput = STATE.last.reput || 1;

    let ideas = (4 * totalPI) + 2*(eqMed + eqHigh) + 1*T + 2*BM + 3*R;

    effOp += (STATE.overheadTemp.instBonus.effOp || 0);
    reput += (STATE.overheadTemp.instBonus.reput || 0);

    const mods = activeEventMods();
    for (const m of mods){
      if (m.kind === "delta"){
        if (m.var === "capExp") capExp += m.value;
        if (m.var === "prodSci") prodSci += m.value;
        if (m.var === "effOp") effOp += m.value;
        if (m.var === "reput") reput += m.value;
        if (m.var === "ideas") ideas += m.value;
      }
    }

    capExp = Math.max(1, capExp);
    prodSci = Math.max(1, prodSci);
    effOp = Math.max(1, effOp);
    reput = Math.max(1, reput);
    ideas = Math.max(0, ideas);

    return { ideas, capExp, prodSci, effOp, innovLevel: innov, reput, totalPI, BM, modPI };
  }

  function bonusTimePI(){
    if (STATE.piTime === "read") return 0;
    if (STATE.piTime === "manage") return 1;
    if (STATE.piTime === "collab") return 2;
    return 0;
  }

  function computeProjectsWritten(ideas, prodSci, effOp){
    const v = floor(0.6*prodSci + 0.4*effOp + bonusTimePI());
    return clamp(Math.min(ideas, Math.max(0, v)), 0, 9999);
  }

  function computeRatio(reput, capExp, prodSci, BM, totalPI){
    let ratio = 10
      + 2*Math.sqrt(reput)
      + 1.2*Math.sqrt(capExp)
      + 1.2*Math.sqrt(prodSci)
      + 6*BM
      + bonusTimePI()
      + 3*totalPI;

    const mods = activeEventMods();
    for (const m of mods){
      if (m.kind === "delta" && m.var === "ratio") ratio += m.value;
    }

    ratio = clamp(Math.round(ratio), 5, 70);
    return ratio;
  }

  function computeArticles(prodSci, effOp, capExp, reput){
    let a = floor(0.35*prodSci + 0.55*effOp + 0.20*Math.sqrt(capExp) + 0.15*Math.sqrt(reput));
    a = Math.max(0, a);
    return a;
  }

  function computeImpactMean(reput, prodSci, innovLevel){
    let v = 2 + 0.4*Math.sqrt(reput) + 0.3*Math.sqrt(prodSci) + 0.8*innovLevel;
    v = clamp(Math.round(v), 1, 10);
    return v;
  }

  function updateImpactIndex(current, articles, impactMean){
    const gain = Math.round(articles * (impactMean/10) * 1.2);
    return Math.max(1, current + gain);
  }

  function computeReputation(articlesTotal, projectsTotal, hadLayoffs){
    let r = 1 + 0.2*Math.sqrt(articlesTotal) + 0.3*Math.sqrt(projectsTotal);
    if (hadLayoffs) r -= 1.0;
    r = Math.max(1, Math.round(r));
    return r;
  }

  function computeBudgetMean(reput, teamSize, innovLevel, capExp, BM){
    let x = 100000
      + 12000*Math.sqrt(reput)
      + 8000*teamSize
      + 16000*innovLevel
      + 5000*Math.sqrt(capExp)
      + 15000*BM;
    x = clamp(Math.round(x), 100000, 300000);
    return x;
  }

  function applyOverheadInstitution(){
    STATE.overheadChoice = "institution";
    STATE.overheadTemp.instBonus.effOp = 2;
    STATE.overheadTemp.instBonus.reput = 1;
  }

  /* =========================================================
     Pantallas
     ========================================================= */
  function TitleScreen(){
    return `
      <div class="topbar">
        <div class="brand">
          <div class="t">LAB TRAIL: 2027</div>
          <div class="s">Simulador tipo Oregon Trail · Periodos anuales · Gestión de laboratorio</div>
        </div>
        <div class="row">
          <span class="pill">Mundo: <strong>${getWorldConfig().label}</strong></span>
          <span class="pill">Versión: <strong>v1.0</strong></span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Tu primer laboratorio</h2>
          <p class="muted">
            Tienes un contrato en una universidad de prestigio. Tu misión es montar un laboratorio que sobreviva y crezca:
            recursos → variables → proyectos → presupuesto → y vuelta a empezar.
          </p>

    const y = yearFromPeriod(STATE.period - 1);
    const nextY = yearFromPeriod(STATE.period);

    const flagsTxt = (STATE.activeFlags.length ? STATE.activeFlags.map(f=>`${f.id.replace("flag_","")} (hasta ${yearFromPeriod(f.expiresAt-1)})`).join(" · ") : "—");

    return `
      <div class="topbar">
        <div class="brand">
          <div class="t">Resultados del año ${y}</div>
          <div class="s">Santiago revisa el año y prepara el siguiente</div>
        </div>
        <div class="row">
          <span class="pill">Siguiente año: <strong>${nextY}</strong></span>
          <span class="pill">Presupuesto próximo: <strong>${eur(L.nextBudget)}</strong></span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Diario del año</h2>

          ${L.events.length ? `
            <div class="notice">
              <div><strong>Eventos:</strong></div>
              <ul class="list">
                ${L.events.map(e=>`<li>${e.name} <span class="muted">(${e.durationTxt})</span><br><span class="muted">${e.text}</span></li>`).join("")}
              </ul>
              <div class="muted small"><strong>Flags activas:</strong> ${flagsTxt}</div>
            </div>
          ` : `<div class="notice"><strong>Sin eventos destacados</strong> este año.</div>`}

          <div class="sep"></div>

          <table class="table">
            <tr><th>Bloque</th><th>Valor</th></tr>
            <tr><td>Ideas</td><td class="mono">${L.ideas}</td></tr>
            <tr><td>Proyectos escritos</td><td class="mono">${L.projectsWritten}</td></tr>
            <tr><td>Ratio de éxito</td><td class="mono">${L.ratio}%</td></tr>
            <tr><td>Proyectos concedidos</td><td class="mono">${L.projectsGranted}</td></tr>
            <tr><td>Artículos publicados</td><td class="mono">${L.articles}</td></tr>
            <tr><td>Impacto medio</td><td class="mono">${L.impactMean}/10</td></tr>
            <tr><td>ImpactoIndex acumulado</td><td class="mono">${STATE.impactIndex}</td></tr>
            <tr><td>Presupuesto medio por proyecto</td><td class="mono">${eur(L.budgetMean)}</td></tr>
            <tr><td>Presupuesto del siguiente año</td><td class="mono">${eur(L.nextBudget)}</td></tr>
          </table>

          <div class="btns">
            <button class="primary" onclick="__LT.go('year')">Continuar</button>
          </div>
        </div>

        <div class="card">
          <h2>Resumen científico</h2>
          <div class="notice">
            <div><strong>Capacidad exp.:</strong> <span class="mono">${L.capExp}</span></div>
            <div><strong>Productividad:</strong> <span class="mono">${L.prodSci}</span></div>
            <div><strong>Eficiencia:</strong> <span class="mono">${L.effOp}</span></div>
            <div><strong>Innovación:</strong> <span class="mono">${L.innovLevel===2?"Alta":L.innovLevel===1?"Media":"Baja"}</span></div>
            <div><strong>Reputación:</strong> <span class="mono">${L.reput}</span></div>
          </div>

          <div class="sep"></div>

          <h3>Consejo de Santiago</h3>
          <p class="muted">
            ${
              L.projectsGranted === 0
                ? "Este año no entró financiación nueva. Ajusta tamaño del equipo y usa overheads para estabilizarte."
                : L.projectsGranted >= 3
                  ? "Muy buen año. Vigila no crecer demasiado rápido para no forzar recortes el próximo periodo."
                  : "Vas en buena dirección. Optimiza eficiencia (AM/IA) y refuerza el éxito (BM/colaboraciones)."
            }
          </p>
        </div>
      </div>
    `;
  }

  /* =========================================================
     Acciones
     ========================================================= */
  window.__LT = {
    startNew(){
      STATE = newGame();
      save();
      setScreen("intro");
    },
    continueGame(){
      if (!STATE.screen || STATE.screen === "title") setScreen("year");
      else render();
    },
    resetSave(){
      wipeSave();
      STATE = newGame();
      save();
      setScreen("title");
    },
    go(screen){
      setScreen(screen);
    },
    setPITime(v){
      STATE.piTime = v;
      save();
      toast("Tiempo del IP actualizado.");
    },

    incStaff(k){
      const gross = getBudgetGross();
      const staff2 = deepClone(STATE.staff);
      staff2[k] += 1;
      if (!canAffordWith(staff2, STATE.ai, gross, STATE.period)) return toast("Presupuesto insuficiente para contratar (incluye operativos y overheads).");
      STATE.staff[k] += 1;
      recalcBudget();
      save(); render();
    },
    decStaff(k){
      if (STATE.staff[k] <= 0) return;
      STATE.staff[k] -= 1;
      recalcBudget();
      save(); render();
    },
    incAI(k){
      const p = STATE.period;
      if (!AI_AVAILABLE[k](p)) return;
      const gross = getBudgetGross();
      const ai2 = deepClone(STATE.ai);
      ai2[k] += 1;
      if (!canAffordWith(STATE.staff, ai2, gross, p)) return toast("Presupuesto insuficiente para ese módulo (incluye operativos y overheads).");
      STATE.ai[k] += 1;
      recalcBudget();
      save(); render();
    },
    decAI(k){
      const p = STATE.period;
      if (!AI_AVAILABLE[k](p)) return;
      if (STATE.ai[k] <= 0) return;
      STATE.ai[k] -= 1;
      recalcBudget();
      save(); render();
    },
    buyEquip(type){
      const cost = COSTS.equipment[type];
      const avail = getBudgetAvailable();
      if (avail < cost) return toast("Presupuesto insuficiente para ese equipo.");
      STATE.equip[type] += 1;
      STATE.budgetGross = getBudgetGross() - cost;
      STATE.equipHistory.push({ type, period: STATE.period });
      recalcBudget();
      save(); render();
    },

    overExtraStaff(){
      resetOverheadTemp();
      STATE.overheadChoice = "extraStaff";
      save();
      setScreen("over_staff");
    },
    pickVirtualStaff(kind){
      resetOverheadTemp();
      STATE.overheadChoice = "extraStaff";
      STATE.overheadTemp.staffVirtual = { AM: kind==="AM"?1:0, T: kind==="T"?1:0 };
      save();
      toast("Personal virtual aplicado (solo este año).");
      setScreen("overheads");
    },

    overExtraAI(){
      resetOverheadTemp();
      STATE.overheadChoice = "extraAI";
      save();
      setScreen("over_ai");
    },
    incVirtualAI(k){
      const p = STATE.period;
      if (!AI_AVAILABLE[k](p)) return;
      const totals = totalAnnualCost(STATE.staff, STATE.ai, p);
      const bolsa = Math.floor(0.5 * overheadsEuro(totals.cP, totals.cAI));
      const v = STATE.overheadTemp.aiVirtual;
      const spend = (v.GPT*1000) + (v.AGI*1000) + (v.PI*10000);
      const cost = (k==="PI"?10000:1000);
      if (spend + cost > bolsa) return toast("No queda bolsa IA.");
      v[k] = (v[k]||0) + 1;
      save(); render();
    },
    decVirtualAI(k){
      const v = STATE.overheadTemp.aiVirtual;
      if ((v[k]||0) <= 0) return;
      v[k] -= 1;
      save(); render();
    },
    confirmVirtualAI(){
      toast("IA virtual aplicada (solo este año).");
      setScreen("overheads");
    },

    overExtraEquip(){
      resetOverheadTemp();
      STATE.overheadChoice = "extraEquip";
      save();
      setScreen("over_equip");
    },
    pickVirtualEquip(type){
      resetOverheadTemp();
      STATE.overheadChoice = "extraEquip";
      STATE.overheadTemp.equipVirtual = { MED: type==="MED"?1:0, HIGH: type==="HIGH"?1:0 };
      save();
      toast("Equipamiento virtual aplicado (solo este año).");
      setScreen("overheads");
    },

    overInstitution(){
      resetOverheadTemp();
      applyOverheadInstitution();
      save();
      toast("La institución gestiona overheads (solo este año).");
      render();
    },

    closeYear(gotoScreen){
      pruneExpiredFlags(STATE);
      STATE.activeEvents = STATE.activeEvents.filter(e => e.endsAt >= STATE.period);

      maybeAddEventsThisPeriod();

      const d = computeDerived();
      const ideas = Math.round(d.ideas);
      const projectsWritten = computeProjectsWritten(ideas, d.prodSci, d.effOp);
      const ratio = computeRatio(d.reput, d.capExp, d.prodSci, STATE.staff.BM, (1+(STATE.ai.PI||0)));
      const projectsGranted = floor(projectsWritten * ratio / 100);

      const articles = computeArticles(d.prodSci, d.effOp, d.capExp, d.reput);
      const impactMean = computeImpactMean(d.reput, d.prodSci, d.innovLevel);

      let impactIndex = STATE.impactIndex;
      const mods = activeEventMods();
      for (const m of mods){
        if (m.kind === "delta" && m.var === "impactIndex") impactIndex += m.value;
      }
      impactIndex = updateImpactIndex(Math.max(1, impactIndex), articles, impactMean);

      STATE.articlesTotal += articles;
      STATE.projectsTotal += projectsGranted;
      STATE.impactIndex = impactIndex;

      const reput = computeReputation(STATE.articlesTotal, STATE.projectsTotal, STATE.last.layoffs);

      const teamSize = STATE.staff.IP + STATE.staff.S + STATE.staff.T + STATE.staff.R + STATE.staff.AM + STATE.staff.BM;
      const budgetMean = computeBudgetMean(reput, teamSize, d.innovLevel, d.capExp, STATE.staff.BM);

      let nextBudget = projectsGranted * budgetMean;

      for (const ev of STATE.activeEvents.filter(e=>e.endsAt>=STATE.period)){
        for (const m of ev.mods){
          if (m.kind === "mul_next_budget"){
            nextBudget *= m.value;
          }
        }
      }
      nextBudget *= (STATE.nextBudgetMultiplier || 1.0);
      nextBudget = Math.round(nextBudget);

      STATE.last = {
        layoffs: STATE.last.layoffs,
        layoffsNote: STATE.last.layoffsNote || "",
        events: STATE.activeEvents
          .filter(e=>e.endsAt>=STATE.period)
          .map(e=>{
            const def = EVENTS.find(x=>x.id===e.id);
            const dur = def?.duration ?? 0;
            const durationTxt = dur===0?"solo este año":dur===1?"2 años":"3 años";
            return { name:e.name, text:e.text, durationTxt };
          }),
        ideas,
        capExp: Math.round(d.capExp),
        prodSci: Math.round(d.prodSci),
        effOp: Math.round(d.effOp),
        innovLevel: d.innovLevel,
        reput,
        projectsWritten,
        ratio,
        projectsGranted,
        articles,
        impactMean,
        budgetMean,
        nextBudget
      };

      // 3) Avanzar periodo
      STATE.period += 1;

      // 4) Aplicar presupuesto del siguiente año (bruto)
      STATE.budgetGross = nextBudget;

      // 5) Reset temporales (overheads se borran) y mantener piTime
      resetOverheadTemp();

      // 6) Inicio del nuevo año: recortes automáticos si hace falta
      const res2 = (!canAffordCurrentSetup() ? enforceAffordability() : {layoffs:false, note:""});
      STATE.last.layoffs = res2.layoffs;
      STATE.last.layoffsNote = res2.note;

      // 7) Recalcula disponible
      recalcBudget();

      save();
      setScreen(gotoScreen || "results");
    }
  };

  let _lastScreen = STATE.screen;

  function ensureYearStart(){
    if (STATE.screen !== "year") return;

    const cameFromOther = _lastScreen !== "year";
    if (!cameFromOther) return;

    getBudgetGross();

    pruneExpiredFlags(STATE);
    STATE.activeEvents = STATE.activeEvents.filter(e => e.endsAt >= STATE.period);

    if (!canAffordCurrentSetup()){
      const res = enforceAffordability();
      STATE.last.layoffs = res.layoffs;
      STATE.last.layoffsNote = res.note;
    } else {
      STATE.last.layoffs = false;
      STATE.last.layoffsNote = "";
    }

    recalcBudget();
    save();
  }

  function render(){
    ensureYearStart();
    // Recalcula presupuesto disponible en cualquier pantalla
    recalcBudget();

    let html = "";
    if (STATE.screen === "title") html = TitleScreen();
    else if (STATE.screen === "intro") html = IntroScreen();
    else if (STATE.screen === "year") html = YearScreen();
    else if (STATE.screen === "santiago") html = SantiagoScreen();
    else if (STATE.screen === "pitime") html = PITimeScreen();
    else if (STATE.screen === "overheads") html = OverheadsScreen();
    else if (STATE.screen === "over_staff") html = OverExtraStaffScreen();
    else if (STATE.screen === "over_ai") html = OverExtraAIScreen();
    else if (STATE.screen === "over_equip") html = OverExtraEquipScreen();
    else if (STATE.screen === "panel") html = PanelScreen();
    else if (STATE.screen === "results") html = ResultsScreen();
    else html = TitleScreen();

    ROOT.innerHTML = html;
    _lastScreen = STATE.screen;
  }

  window.addEventListener("keydown", (e) => {
    if (STATE.screen === "intro" && (e.code === "Space" || e.key === " ")){
      e.preventDefault();
      setScreen("year");
    }
  });

  if (!STATE.screen) STATE.screen = "title";
  render();
  save();
})();
</script>
</body>
</html>
