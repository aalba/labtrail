<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB TRAIL 2027</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#0b1220;
overflow:hidden;
}
iframe{
border:none;
width:100vw;
height:100vh;
}
</style>
</head>

<body>
  
<div id="labtrail-root"></div>

<style>:root{
  --bg:#0b1220;
  --card:#111a2e;
  --card2:#0f1830;
  --ink:#e9eefc;
  --muted:#9fb0d1;
  --line:rgba(255,255,255,.10);
  --accent:#5dd6c2;
  --warn:#ffcc66;
  --bad:#ff6b6b;
  --good:#68f08a;
  --btn:#1f2a44;
  --btn2:#203055;
  --shadow: 0 18px 60px rgba(0,0,0,.35);
  --radius:18px;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:var(--sans); background:transparent; color:var(--ink);
  }
  #labtrail-root{
  max-width: 1100px;
  margin: 18px auto;
  padding: 14px;
  background: radial-gradient(900px 420px at 10% 0%, rgba(93,214,194,.18), transparent 65%),
  radial-gradient(900px 420px at 90% 0%, rgba(140,120,255,.14), transparent 65%),
  linear-gradient(180deg, rgba(11,18,32,.92), rgba(11,18,32,.92));
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: var(--shadow);
  }.topbar{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding: 10px 12px; border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border:1px solid var(--line);
  }.brand{ display:flex; flex-direction:column; gap:2px; }.brand.t{ font-weight:800; letter-spacing:.4px; }.brand.s{ color:var(--muted); font-size: 12px; }.row{ display:flex;
  gap:12px; flex-wrap:wrap; }.pill{
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  color: var(--muted);
  white-space: nowrap;
  }.pill strong{ color: var(--ink); }.grid{
  display:grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 12px;
  margin-top: 12px;
  }
  @media (max-width: 920px){.grid{ grid-template-columns: 1fr; }
  }.card{
  background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  }.card h2{ margin:0 0 10px; font-size: 18px; }.card h3{ margin:0 0 8px; font-size: 15px; color: var(--muted);
  font-weight: 700; }.muted{ color:var(--muted); }.mono{ font-family: var(--mono); }.sep{ height:1px; background: var(--line); margin: 10px 0; }.btns{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 10px;
  }
  button{
  cursor:pointer;
  border: 1px solid var(--line);
  background: var(--btn);
  color: var(--ink);
  border-radius: 14px;
  padding: 10px 12px;
  font-weight: 700;
  transition: transform .05s ease, background .15s ease, border-color .15s ease;
  }
  button:hover{ background: var(--btn2); }
  button:active{ transform: translateY(1px);
  }
  button.primary{
  background: linear-gradient(180deg, rgba(93,214,194,.28), rgba(93,214,194,.10));
  border-color: rgba(93,214,194,.40);
  }
  button.danger{
  background: linear-gradient(180deg, rgba(255,107,107,.24), rgba(255,107,107,.08));
  border-color: rgba(255,107,107,.40);
  }
  button.ghost{
  background: rgba(255,255,255,.03);
  }
  button:disabled{
  opacity:.45; cursor:not-allowed;
  }.kbd{
  display:inline-block;
  border:1px solid var(--line);
  background: rgba(255,255,255,.03);
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  }.list{ margin: 8px 0 0; padding-left: 18px; color: var(--muted);
  }.notice{
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  border-radius: 14px;
  padding: 10px 12px;
  margin-top: 10px;
  }.notice.good{ border-color: rgba(104,240,138,.35);
  }.notice.bad{ border-color: rgba(255,107,107,.35); }.notice.warn{ border-color: rgba(255,204,102,.35); }.table{
  width:100%;
  border-collapse: collapse;
  border:1px solid var(--line);
  border-radius: 14px;
  overflow:hidden;
  }.table th,.table td{
  padding: 8px 10px;
  border-bottom:1px solid var(--line);
  text-align:left;
  font-size: 13px;
  }.table th{ color: var(--muted); font-weight: 800;
  background: rgba(255,255,255,.03); }.table tr:last-child td{ border-bottom:none; }.tag{
  display:inline-block;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 999px;
  border:1px solid var(--line);
  background: rgba(255,255,255,.03);
  color: var(--muted);
  }.tag.good{ border-color: rgba(104,240,138,.35); color: var(--good); }.tag.bad{ border-color: rgba(255,107,107,.35); color: var(--bad); }.tag.warn{ border-color: rgba(255,204,102,.35); color: var(--warn);
  }.small{ font-size: 12px; }.two-col{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  }
  @media (max-width: 700px){.two-col{ grid-template-columns:1fr;
  }
  }.counter{
  display:flex; align-items:center; justify-content:space-between;
  gap:10px; padding: 8px 10px; border:1px solid var(--line);
  border-radius: 14px; background: rgba(255,255,255,.02);
  }.counter.name{ font-weight:800;
  }.counter.meta{ color:var(--muted); font-size:12px; }.counter.actions{ display:flex; gap:8px; }.counter.actions button{ padding: 6px 10px; border-radius: 12px; font-weight:900;
  }
</style>

<script>
(() => {
  const ROOT = document.getElementById("labtrail-root");

  /* =========================================================
  Config “caos del mundo” (futuro: seleccionable en inicio)
  ========================================================= */
  const WORLD_PRESETS = {
  standard: {
  label: "Estándar",
  eventChance: 0.30,
  rareChanceGivenEvent: 0.05,
  secondEventChance: 0.10,
  maxActiveFlags: 2,
  chainBoostMultiplier: 1.0
  },
  predictable: {
  label: "Predecible",
  eventChance: 0.18,
  rareChanceGivenEvent: 0.03,
  secondEventChance: 0.05,
  maxActiveFlags: 1,
  chainBoostMultiplier: 0.7
  },
  chaotic: {
  label: "Caótico",
  eventChance: 0.45,
  rareChanceGivenEvent: 0.10,
  secondEventChance: 0.18,
  maxActiveFlags: 3,
  chainBoostMultiplier: 1.3
  }
  };

  const GAME_SETTINGS = {
  worldPresetKey: "standard"
  };

  function getWorldConfig(){
  return WORLD_PRESETS[GAME_SETTINGS.worldPresetKey] || WORLD_PRESETS.standard;
  }

  /* =========================================================
  Costes / reglas base
  ========================================================= */
  const COSTS = {
  staff: { IP: 80000, S: 35000, T: 50000, R: 50000, AM: 30000, BM: 60000 },
  ai: { GPT: 1000, AGI: 1000, PI: 10000 },
  equipment: { MED: 150000, HIGH: 450000 },
  opsRate: 0.20,
  overheadRate: 0.20
  };
  const EQUIP_EFFECTS = {
  MED: { cap: 2, prod: 1 },
  HIGH: { cap: 7, prod: 4 }
  };
  const AI_AVAILABLE = {
  GPT: (period) => true,
  AGI: (period) => period >= 5,
  PI:  (period) => period >= 10
  };

  /* =========================================================
  Eventos + flags + encadenados
  ========================================================= */
  const EVENTS = [
  // Negativos
  {
  id:"equip_broken", rare:false, duration:1,
  name:" Equipo averiado",
  text:"¡Mala suerte! Uno de tus equipos se avería y el servicio técnico tarda en llegar.",
  mods:[ { kind:"delta", var:"capExp", value:-2 } ],
  flags:[{id:"flag_equip_stress", dur:1}]
  },
  {
  id:"admin_issue", rare:false, duration:2,
  name:" Problema administrativo",
  text:"La oficina de gestión se ha colapsado. Facturas atascadas, compras congeladas.",
  mods:[ { kind:"delta", var:"effOp", value:-2 } ],
  flags:[{id:"flag_admin_colapso", dur:2}]
  },
  {
  id:"funding_delay", rare:false, duration:1,
  name:" Retraso en financiación",
  text:"Te conceden el proyecto… pero el dinero llega tarde.",
  mods:[ { kind:"mul_next_budget", value:0.75 } ],
  flags:[]
  },
  {
  id:"key_sick", rare:false, duration:1,
  name:" Baja médica clave",
  text:"Un miembro clave del equipo coge una baja larga.",
  mods:[ { kind:"delta", var:"prodSci", value:-2 } ],
  flags:[]
  },
  {
  id:"bad_reagents", rare:false, duration:0,
  name:" Reactivos defectuosos",
  text:"Los reactivos salen mal. Repetís experimentos y perdéis semanas.",
  mods:[
  { kind:"mul", var:"articles", value:0.75 },
  { kind:"delta", var:"ideas", value:-1 }
  ],
  flags:[]
  },
  {
  id:"harsh_reviewer", rare:true, duration:2,
  name:" Revisor especialmente duro",
  text:"Un revisor te desmonta el enfoque. Te obliga a rediseñar parte del trabajo.",
  mods:[
  { kind:"delta", var:"impactMean", value:-2 },
  { kind:"delta", var:"ratio", value:-5 }
  ],
  flags:[{id:"flag_scrutiny", dur:2}]
  },

  // Positivos
  {
  id:"intl_collab", rare:false, duration:2,
  name:" Colaboración internacional",
  text:"Conectas con un laboratorio puntero. Compartís muestras y metodología.",
  mods:[
  { kind:"delta", var:"reput", value:+2 },
  { kind:"delta", var:"ratio", value:+5 }
  ],
  flags:[{id:"flag_colab_internacional", dur:2}]
  },
  {
  id:"young_award", rare:true, duration:2,
  name:" Premio joven investigador",
  text:"Te dan un premio. Tu nombre empieza a sonar.",
  mods:[
  { kind:"delta", var:"reput", value:+4 },
  { kind:"mul", var:"budgetMean", value:1.10 }
  ],
  flags:[{id:"flag_award_momentum", dur:2}]
  },
  {
  id:"top_paper", rare:false, duration:1,
  name:" Paper top inesperado",
  text:"Sale un artículo muy potente. Las citas empiezan a subir.",
  mods:[
  { kind:"delta", var:"impactIndex", value:+2 },
  { kind:"delta", var:"reput", value:+1 }
  ],
  flags:[{id:"flag_paper_momentum", dur:1}]
  },
  {
  id:"ai_automation", rare:false, duration:1,
  name:" Automatización brutal",
  text:"Encuentras un flujo de IA que te ahorra días de trabajo.",
  mods:[ { kind:"delta", var:"effOp", value:+3 } ],
  flags:[]
  },
  {
  id:"disruptive_idea", rare:true, duration:0,
  name:" Idea disruptiva",
  text:"Una conversación casual te da una idea realmente disruptiva.",
  mods:[
  { kind:"delta", var:"ideas", value:+4 },
  { kind:"delta", var:"impactMean", value:+1 }
  ],
  flags:[]
  },
  {
  id:"core_facility", rare:false, duration:1,
  name:" Infraestructura compartida",
  text:"La universidad te abre un core facility durante un tiempo.",
  mods:[ { kind:"delta", var:"capExp", value:+4 } ],
  flags:[{id:"flag_core_access", dur:1}]
  }
  ];

  // Encadenados
  const CHAIN_BOOSTS = [
  { flag:"flag_colab_internacional", event:"top_paper", boost:0.15 },
  { flag:"flag_colab_internacional", event:"young_award", boost:0.05 },
  { flag:"flag_paper_momentum", event:"young_award", boost:0.10 },
  { flag:"flag_paper_momentum", event:"intl_collab", boost:0.10 },
  { flag:"flag_admin_colapso", event:"funding_delay", boost:0.20 },
  { flag:"flag_equip_stress", event:"bad_reagents", boost:0.10 },
  { flag:"flag_core_access", event:"top_paper", boost:0.10 },
  { flag:"flag_core_access", event:"harsh_reviewer", boost:0.05 }
  ];

  /* =========================================================
  Utilidades
  ========================================================= */
  const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
  const floor = Math.floor;

  function eur(x){
  const n = Math.round(x);
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " €";
  }
  function yearFromPeriod(p){ return 2027 + p; }

  function rand(){ return Math.random(); }

  function weightedPick(items){
  const sum = items.reduce((s, it) => s + Math.max(0, it.w), 0);
  if (sum <= 0) return items[0]?.item?? null;
  let r = rand() * sum;
  for (const it of items){
  r -= Math.max(0, it.w);
  if (r <= 0) return it.item;
  }
  return items[items.length-1].item;
  }

  function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }

  /* =========================================================
  Flags (máx 2 activas por preset actual)
  ========================================================= */
  function addFlag(state, flagId, durationPeriods){
  const cfg = getWorldConfig();
  const now = state.period;
  const expiresAt = now + durationPeriods + 1;
  const idx = state.activeFlags.findIndex(f => f.id === flagId);
  if (idx!== -1){
  state.activeFlags[idx].expiresAt = Math.max(state.activeFlags[idx].expiresAt, expiresAt);
  return;
  }
  state.activeFlags.push({ id: flagId, addedAt: now, expiresAt });
  while (state.activeFlags.length > cfg.maxActiveFlags){
  state.activeFlags.sort((a,b)=>a.addedAt-b.addedAt);
  state.activeFlags.shift();
  }
  }
  function pruneExpiredFlags(state){
  const now = state.period;
  state.activeFlags = state.activeFlags.filter(f => f.expiresAt > now);
  }
  function applyChainBoost(baseProb, boostProb){
  const cfg = getWorldConfig();
  return Math.min(1, baseProb + boostProb * cfg.chainBoostMultiplier);
  }

  /* =========================================================
  Estado del juego
  ========================================================= */
  const SAVE_KEY = "LABTRAIL_SAVE_V1";
  function newGame(){
  return {
  screen: "title",
  period: 0,
  budgetGross: 400000,  // presupuesto bruto del periodo (ingreso)

  staff: { IP:1, S:0, T:0, R:0, AM:0, BM:0 },
  ai: { GPT:0, AGI:0, PI:0 },
  equip: { MED:0, HIGH:0 },
  equipHistory: [],  

  // Decisiones del año
  piTime: "read",  
  overheadChoice: null,  
  overheadTemp: {  
  staffVirtual: { AM:0, T:0 },
  aiVirtual: { GPT:0, AGI:0, PI:0 },
  equipVirtual: { MED:0, HIGH:0 },
  instBonus: { effOp:0, reput:0 }
  },

  // Variables acumuladas
  articlesTotal: 0,
  projectsTotal: 0,
  impactIndex: 1,  

  // Variables por periodo (último año)
  last: {
  layoffs: false,
  layoffsNote: "",
  events: [],
  ideas: 0,
  capExp: 1,
  prodSci: 1,
  effOp: 1,
  innovLevel: 0,  
  reput: 1,
  projectsWritten: 0,
  ratio: 10,
  projectsGranted: 0,
  articles: 0,
  impactMean: 1,
  budgetMean: 100000,
  nextBudget: 0
  },

  // Eventos / flags
  activeEvents: [],  
  activeFlags: [],  

  // UI
  toast: ""
  };
  }

  let STATE = load() || newGame();
  ensureBudgetFields();

  function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(STATE)); }catch(e){}
  }
  function load(){
  try{
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return null;
  const s = JSON.parse(raw);
  return {...newGame(),...s };
  }catch(e){ return null; }
  }
  function wipeSave(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  }

  function setScreen(screen){
  STATE.screen = screen;
  save();
  render();
  }

  function toast(msg){
  STATE.toast = msg;
  save();
  render();
  setTimeout(()=>{
  if (STATE.toast === msg){
  STATE.toast = "";
  save();
  render();
  }
  }, 2500);
  }

  /* =========================================================
  Cálculos de costes y Presupuesto Dinámico
  ========================================================= */
  function staffCost(staff){
  return (
  staff.IP * COSTS.staff.IP +
  staff.S  * COSTS.staff.S +
  staff.T  * COSTS.staff.T +
  staff.R  * COSTS.staff.R +
  staff.AM * COSTS.staff.AM +
  staff.BM * COSTS.staff.BM
  );
  }
  function aiCost(ai, period){
  let c = 0;
  c += (ai.GPT||0) * COSTS.ai.GPT;
  c += (AI_AVAILABLE.AGI(period)? (ai.AGI||0): 0) * COSTS.ai.AGI;
  c += (AI_AVAILABLE.PI(period)? (ai.PI||0): 0) * COSTS.ai.PI;
  return c;
  }
  function opsCost(costPersonal){
  return COSTS.opsRate * costPersonal;
  }
  function overheadsEuro(costPersonal, costAI){
  const ops = opsCost(costPersonal);
  const subtotal = costPersonal + ops + costAI;
  return COSTS.overheadRate * subtotal;
  }
  function totalAnnualCost(staff, ai, period){
  const cP = staffCost(staff);
  const cAI = aiCost(ai, period);
  const ops = opsCost(cP);
  const oh = overheadsEuro(cP, cAI);
  return { cP, cAI, ops, oh, total: cP + cAI + ops + oh };
  }

  function canAffordWith(staff, ai, gross, period){
  const t = totalAnnualCost(staff, ai, period);
  return (gross || 0) >= t.total;
  }

  /* =========================================================
  Presupuesto disponible (calculado al vuelo, no guardado)
  ========================================================= */
  function getBudgetInfo(){
  const p = STATE.period;
  const gross = STATE.budgetGross || 0;
  const t = totalAnnualCost(STATE.staff, STATE.ai, p);
  const avail = Math.max(0, Math.round(gross - t.total));
  return {...t, avail, gross };
  }

  function ensureBudgetFields(){
  // Compatibilidad partidas antiguas
  if (typeof STATE.budgetGross !== "number") STATE.budgetGross = Number(STATE.budget || 0) || 0;
  // Eliminamos claves obsoletas
  delete STATE.budget;
  delete STATE.nextBudgetMultiplier;
  }

  /* =========================================================
  Despidos automáticos / recortes IA (inicio de año)
  ========================================================= */
  function enforceAffordability(){
  const p = STATE.period;
  let note = [];
  let layoffs = false;

  const canAfford = () => {
  const t = totalAnnualCost(STATE.staff, STATE.ai, p);
  return (STATE.budgetGross || 0) >= t.total;
  };

  if (canAfford()) return { layoffs:false, note:"" };

  const aiOrder = ["GPT","AGI","PI"];
  for (const k of aiOrder){
  while (STATE.ai[k] > 0 &&!canAfford()){
  STATE.ai[k] -= 1;
  layoffs = true;
  note.push(`-1 módulo ${k}`);
  }
  }

  const staffOrder = ["AM","BM","S","T","R"];
  for (const k of staffOrder){
  while (STATE.staff[k] > 0 &&!canAfford()){
  STATE.staff[k] -= 1;
  layoffs = true;
  note.push(`-1 ${k}`);
  }
  }

  if (!canAfford()){
  layoffs = true;
  note.push(" Presupuesto insuficiente incluso tras recortes (IP fijo).");
  }

  return { layoffs, note: note.join(" · ") };
  }

  /* =========================================================
  Variables derivadas
  ========================================================= */
  function innovationLevel(){
  const p = STATE.period;
  if (STATE.equipHistory.length === 0) return 0;
  const last = Math.max(...STATE.equipHistory.map(e => e.period));
  const diff = p - last;
  if (diff <= 4) return 2;
  if (diff <= 10) return 1;
  return 0;
  }

  function activeEventMods(){
  const p = STATE.period;
  return STATE.activeEvents.filter(ev => ev.endsAt >= p).flatMap(ev => ev.mods.map(m => ({...m, _src: ev.name})));
  }

  function computeDerived(){
  const p = STATE.period;

  const staff = STATE.staff;
  const ai = STATE.ai;
  const equip = STATE.equip;

  const vStaffAM = STATE.overheadTemp.staffVirtual.AM || 0;
  const vStaffT  = STATE.overheadTemp.staffVirtual.T  || 0;

  const vAI = STATE.overheadTemp.aiVirtual;
  const vEquip = STATE.overheadTemp.equipVirtual;
  const totalPI = 1 + (ai.PI || 0); 

  const eqMed = equip.MED + (vEquip.MED||0);
  const eqHigh = equip.HIGH + (vEquip.HIGH||0);

  const modGPT = (ai.GPT||0) + (vAI.GPT||0);
  const modAGI = (AI_AVAILABLE.AGI(p)? (ai.AGI||0): 0) + (AI_AVAILABLE.AGI(p)? (vAI.AGI||0): 0);
  const modPI  = (AI_AVAILABLE.PI(p)? (ai.PI||0): 0) + (AI_AVAILABLE.PI(p)? (vAI.PI||0): 0);

  const S = staff.S;
  const T = staff.T + vStaffT;
  const R = staff.R;
  const AM = staff.AM + vStaffAM;
  const BM = staff.BM;
  const innov = innovationLevel();

  let capExp = Math.max(1, 1 + 2*eqMed + 7*eqHigh + 3*modPI + 0.8*T + 0.3*S + 0.4*R);
  let prodSci = Math.max(1, 1 + 1.5*R + 0.8*(modGPT+modAGI) + 0.4*eqMed + 1.2*eqHigh + 0.3*S);
  let effOp = Math.max(1, 1 + 1.2*AM + 0.6*(modGPT+modAGI));
  let reput = STATE.last.reput || 1;

  let ideas = (4 * totalPI) + 2*(eqMed + eqHigh) + 1*T + 2*BM + 3*R;
  effOp += (STATE.overheadTemp.instBonus.effOp || 0);
  reput += (STATE.overheadTemp.instBonus.reput || 0);
  
  const mods = activeEventMods();
  for (const m of mods){
  if (m.kind === "delta"){
  if (m.var === "capExp") capExp += m.value;
  if (m.var === "prodSci") prodSci += m.value;
  if (m.var === "effOp") effOp += m.value;
  if (m.var === "reput") reput += m.value;
  if (m.var === "ideas") ideas += m.value;
  }
  }

  capExp = Math.max(1, capExp);
  prodSci = Math.max(1, prodSci);
  effOp = Math.max(1, effOp);
  reput = Math.max(1, reput);
  ideas = Math.max(0, ideas);

  return { ideas, capExp, prodSci, effOp, innovLevel: innov, reput, totalPI, BM, modPI };
  }

  /* =========================================================
  Proyectos, ratio, artículos, impacto, presupuesto medio
  ========================================================= */
  function bonusTimePI(){
  if (STATE.piTime === "read") return 0;
  if (STATE.piTime === "manage") return 1;
  if (STATE.piTime === "collab") return 2;
  return 0;
  }

  function computeProjectsWritten(ideas, prodSci, effOp){
  const v = floor(0.6*prodSci + 0.4*effOp + bonusTimePI());
  return clamp(Math.min(ideas, Math.max(0, v)), 0, 9999);
  }

  function computeRatio(reput, capExp, prodSci, BM, totalPI){
  let ratio = 8
    + 1.8*Math.sqrt(reput)
    + 1.0*Math.sqrt(capExp)
    + 1.1*Math.sqrt(prodSci)
    + 4*BM
    + 1.5*totalPI
    + 5*bonusTimePI();
  const mods = activeEventMods();
  for (const m of mods){
  if (m.kind === "delta" && m.var === "ratio") ratio += m.value;
  }
  ratio = clamp(Math.round(ratio), 5, 45);
  return ratio;
  }

  function computeArticles(prodSci, effOp, capExp, reput){
  let a = floor(0.35*prodSci + 0.55*effOp + 0.20*Math.sqrt(capExp) + 0.15*Math.sqrt(reput));
  a = Math.max(0, a);
  const mods = activeEventMods();
  for (const m of mods){
  if (m.kind === "mul" && m.var === "articles") a = floor(a * m.value);
  }
  return Math.max(0, a);
  }

  function computeImpactMean(reput, prodSci, innovLevel){
  let im = 1 + 0.25*Math.sqrt(reput) + 0.25*Math.sqrt(prodSci) + 0.6*innovLevel;
  const mods = activeEventMods();
  for (const m of mods){
  if (m.kind === "delta" && m.var === "impactMean") im += m.value;
  }
  return clamp(Math.round(im * 10)/10, 1, 10);
  }

  function computeReputation(articlesTotal, projectsTotal, layoffsRecent){
  const penalty = layoffsRecent? 2: 0;
  const r = 1 + Math.sqrt(Math.max(0, articlesTotal)) + Math.sqrt(Math.max(0, projectsTotal)) - penalty;
  return Math.max(1, Math.round(r));
  }

  function computeBudgetMean(reput, teamSize, innovLevel, capExp, BM){
  const score =
  0.25*Math.sqrt(reput) +
  0.20*teamSize +
  0.25*innovLevel +
  0.30*Math.sqrt(capExp);
  const s = clamp(score, 0, 10) / 10;
  let mean = 100000 + 200000*s;
  const bmMult = clamp(1 + 0.02*BM, 1, 1.10);
  mean *= bmMult;
  const mods = activeEventMods();
  for (const m of mods){
  if (m.kind === "mul" && m.var === "budgetMean") mean *= m.value;
  }
  return Math.round(mean);
  }

  function updateImpactIndex(prevIndex, articles, impactMean){
  let add = floor(((articles * impactMean) / (10 + prevIndex)) * 3);
  add = Math.max(0, add);
  return Math.max(1, prevIndex + add);
  }

  /* =========================================================
     Vista previa del siguiente periodo (en tiempo real)
     ========================================================= */
  function previewNextPeriod(){
    const p = STATE.period;
    const d = computeDerived();
    const ideas = Math.round(d.ideas);
    const projectsWritten = computeProjectsWritten(ideas, d.prodSci, d.effOp);
    const ratio = computeRatio(d.reput, d.capExp, d.prodSci, STATE.staff.BM, (1 + (STATE.ai.PI||0)));
    const projectsGranted = floor(projectsWritten * ratio / 100);
    const articles = computeArticles(d.prodSci, d.effOp, d.capExp, d.reput);
    const newArticlesTotal = (STATE.articlesTotal||0) + articles;
    const newProjectsTotal = (STATE.projectsTotal||0) + projectsGranted;

    const reputNext = computeReputation(newArticlesTotal, newProjectsTotal, !!(STATE.last && STATE.last.layoffs));
    const teamSize =
      (STATE.staff.IP||0) + (STATE.staff.S||0) + (STATE.staff.T||0) +
      (STATE.staff.R||0) + (STATE.staff.AM||0) + (STATE.staff.BM||0);
    const budgetMean = computeBudgetMean(reputNext, teamSize, d.innovLevel, d.capExp, STATE.staff.BM);

    let nextBudgetGross = Math.round(projectsGranted * budgetMean);
    for (const ev of (STATE.activeEvents||[]).filter(e => e.endsAt >= p)){
      for (const m of (ev.mods||[])){
        if (m.kind === "mul_next_budget") nextBudgetGross *= m.value;
      }
    }
    nextBudgetGross = Math.round(nextBudgetGross);
    const sim = simulateAffordability(nextBudgetGross, p + 1);
    return {
      projectsWritten,
      projectsGranted,
      ratio,
      budgetMean,
      nextBudgetGross,
      nextBudgetAvailable: sim.available,
      nextStaff: sim.staff,
      nextAI: sim.ai,
      layoffs: sim.layoffs
    };
  }

  function simulateAffordability(gross, period){
    const staff = JSON.parse(JSON.stringify(STATE.staff));
    const ai = JSON.parse(JSON.stringify(STATE.ai));
    const can = () => canAffordWith(staff, ai, gross, period);

    let layoffs = false;
    if (!can()){
      const aiOrder = ["GPT","AGI","PI"];
      for (const k of aiOrder){
        while ((ai[k]||0) > 0 && !can()){
          ai[k] -= 1;
          layoffs = true;
        }
      }
      const staffOrder = ["AM","BM","S","T","R"];
      for (const k of staffOrder){
        while ((staff[k]||0) > 0 && !can()){
          staff[k] -= 1;
          layoffs = true;
        }
      }
    }

    const totals = totalAnnualCost(staff, ai, period);
    const available = Math.max(0, Math.round(gross - totals.total));

    return { staff, ai, available, layoffs };
  }

/* =========================================================
  Overheads (temporales)
  ========================================================= */
  function resetOverheadTemp(){
  STATE.overheadTemp = {
  staffVirtual: { AM:0, T:0 },
  aiVirtual: { GPT:0, AGI:0, PI:0 },
  equipVirtual: { MED:0, HIGH:0 },

  /* =========================================================
  Evento: sorteo
  ========================================================= */
  function computeEventWeight(event){
  let w = event.rare? 1: 4; 
  const cfg = getWorldConfig();
  for (const f of STATE.activeFlags){
  for (const b of CHAIN_BOOSTS){
  if (b.flag === f.id && b.event === event.id){
  w += (b.boost * 20) * cfg.chainBoostMultiplier;
  }
  }
  }
  return Math.max(0, w);
  }

  function maybeAddEventsThisPeriod(){
  const cfg = getWorldConfig();

  function rollOneEvent(){
  if (rand() > cfg.eventChance) return null;
  const isRare = rand() < cfg.rareChanceGivenEvent;
  const pool = EVENTS.filter(e => e.rare === isRare);
  const pick = weightedPick(pool.map(e => ({ item: e, w: computeEventWeight(e) })));
  return pick || null;
  }

  const e1 = rollOneEvent();
  if (e1) attachEvent(e1);

  if (e1 && rand() < cfg.secondEventChance){
  const pool = EVENTS.filter(e =>!e.rare);
  const pick = weightedPick(pool.map(e => ({ item: e, w: computeEventWeight(e) })));
  if (pick) attachEvent(pick);
  }
  }

  function attachEvent(evDef){
  const p = STATE.period;
  const endsAt = p + (evDef.duration || 0);
  STATE.activeEvents.push({
  id: evDef.id,
  name: evDef.name,
  text: evDef.text,
  endsAt,
  mods: deepClone(evDef.mods || [])
  });
  for (const f of (evDef.flags || [])){
  addFlag(STATE, f.id, f.dur);
  }
  }

  window.__LT = {
  startNew(){
  STATE = newGame();
  save();
  setScreen("intro");
  },
  continueGame(){
  if (!STATE.screen || STATE.screen === "title") setScreen("year");
  else render();
  },
  resetSave(){
  wipeSave();
  STATE = newGame();
  save();
  setScreen("title");
  },
  go(screen){
  setScreen(screen);
  },
  setPITime(v){
  STATE.piTime = v;
  save();
  toast("Tiempo del IP actualizado.");
  },

  // Personal / IA / Equip
  incStaff(k){
  const p = STATE.period;
  if (k === "IP") return;
  const prev = STATE.staff[k];
  STATE.staff[k] = prev + 1;

  const t = totalAnnualCost(STATE.staff, STATE.ai, p);
  const gross = STATE.budgetGross || 0;

  if (gross < t.total){
  STATE.staff[k] = prev;
  return toast("Presupuesto insuficiente (incluye operativos + overheads).");
  }

  save(); render();
  },
  decStaff(k){
  if (k === "IP") return;
  if (STATE.staff[k] <= 0) return;
  STATE.staff[k] -= 1;
  save(); render();
  },
  incAI(k){
  const p = STATE.period;
  if (!AI_AVAILABLE[k](p)) return;
  const prev = STATE.ai[k] || 0;
  STATE.ai[k] = prev + 1;

  const t = totalAnnualCost(STATE.staff, STATE.ai, p);
  const gross = STATE.budgetGross || 0;

  if (gross < t.total){
  STATE.ai[k] = prev;
  return toast("Presupuesto insuficiente (incluye operativos + overheads).");
  }

  save(); render();
  },
  decAI(k){
  const p = STATE.period;
  if (!AI_AVAILABLE[k](p)) return;
  if ((STATE.ai[k]||0) <= 0) return;
  STATE.ai[k] -= 1;
  save(); render();
  },
  buyEquip(type){
  const cost = COSTS.equipment[type];
  const info = getBudgetInfo();
  
  if (info.avail < cost) return toast("Presupuesto insuficiente para ese equipo.");
  
  STATE.equip[type] += 1;
  STATE.budgetGross -= cost;
  STATE.equipHistory.push({ type, period: STATE.period });
  save(); render();
  },

  // Overheads
  overExtraStaff(){
  resetOverheadTemp();
  STATE.overheadChoice = "extraStaff";
  save();
  setScreen("over_staff");
  },

  resetOverheadTemp();
  STATE.overheadChoice = "extraStaff";
  STATE.overheadTemp.staffVirtual = { AM: kind==="AM"?1:0, T: kind==="T"?1:0 };
  save();
  toast("Personal virtual aplicado (solo este año).");
  setScreen("overheads");

  overExtraAI(){
  resetOverheadTemp();
  STATE.overheadChoice = "extraAI";
  save();
  setScreen("over_ai");
  },
  incVirtualAI(k){
  const p = STATE.period;
  if (!AI_AVAILABLE[k](p)) return;
  const totals = totalAnnualCost(STATE.staff, STATE.ai, p);
  const bolsa = Math.floor(0.5 * overheadsEuro(totals.cP, totals.cAI));
  const v = STATE.overheadTemp.aiVirtual;
  const spend = (v.GPT*1000) + (v.AGI*1000) + (v.PI*10000);
  const cost = (k==="PI"?10000:1000);
  if (spend + cost > bolsa) return toast("No queda bolsa IA.");
  v[k] = (v[k]||0) + 1;
  save(); render();

  // Cierre de año
  nextPeriod(){
  this.closeYear("year");
  },

  closeYear(targetScreen="results"){
  pruneExpiredFlags(STATE);
  STATE.activeEvents = STATE.activeEvents.filter(e => e.endsAt >= STATE.period);
  maybeAddEventsThisPeriod();

  const d = computeDerived();
  const ideas = Math.round(d.ideas);
  const projectsWritten = computeProjectsWritten(ideas, d.prodSci, d.effOp);
  const ratio = computeRatio(d.reput, d.capExp, d.prodSci, STATE.staff.BM, (1+(STATE.ai.PI||0)));
  const projectsGranted = floor(projectsWritten * ratio / 100);

  const articles = computeArticles(d.prodSci, d.effOp, d.capExp, d.reput);
  const impactMean = computeImpactMean(d.reput, d.prodSci, d.innovLevel);

  let impactIndex = STATE.impactIndex;
  const mods = activeEventMods();
  for (const m of mods){
  if (m.kind === "delta" && m.var === "impactIndex") impactIndex += m.value;
  }
  impactIndex = updateImpactIndex(Math.max(1, impactIndex), articles, impactMean);

  STATE.articlesTotal += articles;
  STATE.projectsTotal += projectsGranted;
  STATE.impactIndex = impactIndex;
  
  const reput = computeReputation(STATE.articlesTotal, STATE.projectsTotal, STATE.last.layoffs);
  const teamSize = STATE.staff.IP + STATE.staff.S + STATE.staff.T + STATE.staff.R + STATE.staff.AM + STATE.staff.BM;
  const budgetMean = computeBudgetMean(reput, teamSize, d.innovLevel, d.capExp, STATE.staff.BM);

  let nextBudget = projectsGranted * budgetMean;
  for (const ev of STATE.activeEvents.filter(e=>e.endsAt>=STATE.period)){
  for (const m of ev.mods){
  if (m.kind === "mul_next_budget"){
  nextBudget *= m.value;
  }
  }
  }
  nextBudget = Math.round(nextBudget);

  STATE.last = {
  layoffs: STATE.last.layoffs, 
  layoffsNote: STATE.last.layoffsNote || "",
  events: STATE.activeEvents
        .filter(e => e.endsAt >= STATE.period)
        .map(e => {
          const def = EVENTS.find(x => x.id === e.id);
          const dur = (def?.duration ?? 0);
          const durationTxt = dur === 0 ? "solo este año" : (dur === 1 ? "2 años" : "3 años");
         
          return { name: e.name, text: e.text, durationTxt };
        }),
  ideas,
  capExp: Math.round(d.capExp),
  prodSci: Math.round(d.prodSci),
  effOp: Math.round(d.effOp),
  innovLevel: d.innovLevel,
  reput,
  projectsWritten,
  ratio,
  projectsGranted,
  articles,
  impactMean,
  budgetMean,
  nextBudget
  };
  
  STATE.period += 1;
  STATE.budgetGross = nextBudget;
  resetOverheadTemp();

  ensureBudgetFields();
  const res = enforceAffordability();
  STATE.last.layoffs =!!res.layoffs;
  STATE.last.layoffsNote = res.note || "";

  save();
  setScreen(targetScreen);
  }
  };

  /* =========================================================
  Entrada al año
  ========================================================= */
  let _lastScreen = STATE.screen;

  function ensureYearStart(){
  if (STATE.screen!== "year") return;

  const cameFromOther = _lastScreen!== "year";
  if (!cameFromOther) return;

  ensureBudgetFields();
  pruneExpiredFlags(STATE);
  STATE.activeEvents = STATE.activeEvents.filter(e => e.endsAt >= STATE.period);
  
  const res = enforceAffordability();
  STATE.last.layoffs =!!res.layoffs;
  STATE.last.layoffsNote = res.note || "";

  save();
  }

  /* =========================================================
  Render
  ========================================================= */
  function render(){
  ensureYearStart();

  let html = "";
  if (STATE.screen === "title") html = TitleScreen();
  else if (STATE.screen === "intro") html = IntroScreen();
  else if (STATE.screen === "year") html = YearScreen();
  else if (STATE.screen === "santiago") html = SantiagoScreen();
  else if (STATE.screen === "pitime") html = PITimeScreen();
  else if (STATE.screen === "overheads") html = OverheadsScreen();
  else if (STATE.screen === "over_staff") html = OverExtraStaffScreen();
  else if (STATE.screen === "over_ai") html = OverExtraAIScreen();
  else if (STATE.screen === "over_equip") html = OverExtraEquipScreen();
  else if (STATE.screen === "panel") html = PanelScreen();
  else if (STATE.screen === "results") html = ResultsScreen();
  else html = TitleScreen();

  ROOT.innerHTML = html;
  _lastScreen = STATE.screen;
  }

  // Teclado: espacio para avanzar en intro
  window.addEventListener("keydown", (e) => {
  if (STATE.screen === "intro" && (e.code === "Space" || e.key === " ")){
  e.preventDefault();
  setScreen("year");
  }
  });
  
  // Arranque: si no hay screen, vuelve a title
  if (!STATE.screen) STATE.screen = "title";
  render();
  save();
})();
</script>

</body>
</html>
